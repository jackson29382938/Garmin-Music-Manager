name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos-swift-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v
