name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: "Garmin Music Manager"

jobs:
  macos-swift-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Install libmtp
        run: brew install libmtp || true

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      - name: Release build
        run: swift build -c release -v
