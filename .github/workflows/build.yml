name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: "Garmin Music Manager"

jobs:
  macos-swift-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Install libmtp
        run: brew install libmtp || true

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      - name: Release build
        run: swift build -c release -v

      - name: Package app smoke
        run: |
          ./Scripts/package-app.sh
          test -x "dist/Garmin Music Manager.app/Contents/MacOS/GarminMusicManager"
          test -x "dist/Garmin Music Manager.app/Contents/MacOS/GarminMTPHelper"
          # Helper should link to bundled libmtp when Homebrew provided it.
          if otool -L "dist/Garmin Music Manager.app/Contents/MacOS/GarminMTPHelper" | grep -q 'Frameworks/libmtp'; then
            echo "Bundled libmtp linkage OK"
          else
            echo "warning: helper not linked to bundled libmtp (may need Homebrew at runtime)"
          fi
